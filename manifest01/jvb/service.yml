# =============================================================================
# Service: jvb-api
# Internal ClusterIP service for health checks and REST API access.
# Operators can port-forward to /about/stats for metrics collection.
# (Extension point: scrape this with a Prometheus ServiceMonitor later)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: jvb-api
  namespace: jitsi
  labels:
    app.kubernetes.io/name: jvb
    app.kubernetes.io/part-of: jitsi-meet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jvb
  ports:
    - name: http-api
      port: 8080
      targetPort: http-api
      protocol: TCP
 
---
# =============================================================================
# Service: jvb-media
# Exposes UDP 10000 for WebRTC media to the internet.
#
# Type: LoadBalancer
#   - Cloud (GKE/EKS/AKS): provisions an external LB with a stable public IP.
#     → Set JVB_ADVERTISE_IPS in jvb-config to this LB's IP once provisioned.
#   - Bare metal (with MetalLB): works the same way.
#   - NodePort alternative: change type to NodePort and use a node's public IP.
#
# ⚠️  UDP LoadBalancer support varies by cloud provider.
#     On AWS use NLB (add service.beta.kubernetes.io/aws-load-balancer-type: nlb)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: jvb-media
  namespace: jitsi
  labels:
    app.kubernetes.io/name: jvb
    app.kubernetes.io/part-of: jitsi-meet
  annotations:
    # ── AWS (uncomment if running on EKS) ─────────────────────────────────
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # ── GKE (no annotation needed — UDP LB works out of the box) ──────────
    # ── Extension point: add cloud-specific annotations here ──────────────
    {}
spec:
  type: LoadBalancer
  # Optional: pin to a specific pre-allocated IP (cloud provider dependent)
  # loadBalancerIP: "203.0.113.10"
  selector:
    app.kubernetes.io/name: jvb
  ports:
    - name: media-udp
      port: 10000
      targetPort: media-udp
      protocol: UDP
    # TCP fallback — uncomment to enable
    # - name: media-tcp
    #   port: 4443
    #   targetPort: media-tcp
    #   protocol: TCP
 

