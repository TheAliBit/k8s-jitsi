# =============================================================================
# 02-jicofo.yaml
# COMPONENT: Jicofo (Jitsi Conference Focus)
#
# ROLE: Conference session manager.
#   - Acts as the XMPP focus user that owns each conference room in Prosody
#   - Selects which JVB(s) to use for each conference (via jvbbrewery MUC)
#   - Handles participant admission, SIP gateway integration (if used)
#   - Communicates with Prosody over XMPP (port 5222)
#
# DEPENDENCIES:
#   - prosody must be running and healthy before jicofo starts
#   - Reads JICOFO_AUTH_PASSWORD and JICOFO_COMPONENT_SECRET from jitsi-secrets
#
# PORTS: No inbound ports — jicofo only makes outbound XMPP connections.
#
# SCALING: Single replica. Jicofo is a single-focus coordinator per cluster.
#   For large-scale deployments, Jicofo supports shard-based clustering
#   (requires additional config, out of scope here).
# =============================================================================
 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jicofo
  namespace: jitsi
  labels:
    app.kubernetes.io/name: jicofo
    app.kubernetes.io/part-of: jitsi-meet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jicofo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jicofo
        app.kubernetes.io/part-of: jitsi-meet
    spec:
      restartPolicy: Always
 
      # Wait for Prosody to be reachable before starting jicofo.
      # initContainer performs a simple TCP check on the XMPP client port.
      initContainers:
        - name: wait-for-prosody
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Prosody XMPP on prosody:5222..."
              until nc -z prosody.jitsi.svc.cluster.local 5222; do
                echo "Prosody not ready — sleeping 5s"
                sleep 5
              done
              echo "Prosody is up — starting jicofo"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
 
      containers:
        - name: jicofo
          image: jitsi/jicofo:stable-9364
          imagePullPolicy: IfNotPresent
 
          # ── Environment: shared config + jicofo-specific values ─────────────
          envFrom:
            - configMapRef:
                name: jitsi-common-config
 
          env:
            # Jicofo authenticates to Prosody as user "focus@auth.meet.jitsi"
            - name: JICOFO_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JICOFO_AUTH_PASSWORD
            - name: JICOFO_COMPONENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JICOFO_COMPONENT_SECRET
            # JVB selection strategy — single bridge is default.
            # Change to "split" or "load-balancing" for multi-JVB deployments.
            - name: JICOFO_BRIDGE_SELECTION_STRATEGY
              value: "SingleBridgeSelectionStrategy"
            # Health check endpoint port for probes below
            - name: JICOFO_REST_PORT
              value: "8888"
 
          # ── Probes ─────────────────────────────────────────────────────────
          # Jicofo exposes a REST health endpoint on port 8888.
          readinessProbe:
            httpGet:
              path: /about/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
 
          livenessProbe:
            httpGet:
              path: /about/health
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 5
 
          ports:
            # REST API — internal only, used for health checks and diagnostics
            - name: http-api
              containerPort: 8888
              protocol: TCP
 
          # ── Resources ──────────────────────────────────────────────────────
          # Jicofo is CPU-light but needs enough memory for large conferences.
          # 1000 participants across conferences → raise memory to 1Gi+.
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
 

