# =============================================================================
# Secret — sensitive XMPP credentials.
# All values are base64-encoded.  Replace every value before deploying.
#
# Generate strong secrets:
#   openssl rand -hex 16 | tr -d '\n' | base64
#
# Credential map:
#   JICOFO_AUTH_PASSWORD    → jicofo logs into prosody with this password
#   JVB_AUTH_PASSWORD       → jvb logs into prosody with this password
#   JICOFO_COMPONENT_SECRET → prosody component shared secret for jicofo
#   JVB_COMPONENT_SECRET    → prosody component shared secret for jvb
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: jitsi-secrets
  namespace: jitsi
  labels:
    app.kubernetes.io/part-of: jitsi-meet
type: Opaque
data:
  # ⚠️  REPLACE ALL VALUES BELOW WITH STRONG RANDOM SECRETS BEFORE DEPLOYING ⚠️
  # Plaintext examples shown in comments — do NOT use these in production.
 
  # "jicofo-secret-change-me"
  JICOFO_AUTH_PASSWORD: amljb2ZvLXNlY3JldC1jaGFuZ2UtbWU=
  # "jvb-secret-change-me"
  JVB_AUTH_PASSWORD: anZiLXNlY3JldC1jaGFuZ2UtbWU=
  # "jicofo-component-change-me"
  JICOFO_COMPONENT_SECRET: amljb2ZvLWNvbXBvbmVudC1jaGFuZ2UtbWU=
  # "jvb-component-change-me"
  JVB_COMPONENT_SECRET: anZiLWNvbXBvbmVudC1jaGFuZ2UtbWU=

