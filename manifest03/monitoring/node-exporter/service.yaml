apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
  # Prometheus will discover this service via its labels
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
spec:
  # ClusterIP: none = headless, Prometheus scrapes each pod IP directly
  clusterIP: None
  selector:
    app: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP