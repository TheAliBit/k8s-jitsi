apiVersion: v1
kind: Service
metadata:
  name: jvb
  namespace: jitsi
spec:
  type: NodePort
  selector:
    app: jvb
  ports:
    - name: jvb-tcp
      port: 4443
      targetPort: 4443
      nodePort: 30443
      protocol: TCP
    - name: jvb-udp
      port: 10000
      targetPort: 10000
      nodePort: 30000
      protocol: UDP