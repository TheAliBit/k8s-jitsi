---
# =============================================================================
# Jitsi Meet — Local VM Lab (HTTP only, no domain, no TLS)
# =============================================================================
# Usage:
#   kubectl apply -f jitsi-local-lab.yaml
#   Access: http://<any-node-ip>:30080
#
# WebRTC works via JVB TCP harvester on NodePort 30443 (plain TCP, not HTTPS).
# Set YOUR_NODE_IP below to the IP of any node reachable from your browser.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: jitsi

---
# ----------------------------------------------------------------------------
# Shared config: change YOUR_NODE_IP to your VM/node IP (e.g. 192.168.1.100)
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: jitsi-config
  namespace: jitsi
data:
  # ---- Network ----
  PUBLIC_URL: "http://192.168.122.65:30080"
  JVB_ADVERTISE_IPS: "192.168.122.65"
  # ---- Disable all TLS / HTTPS ----
  ENABLE_LETSENCRYPT: "0"
  DISABLE_HTTPS: "1"
  ENABLE_HTTP_REDIRECT: "0"

  # ---- XMPP / Prosody ----
  XMPP_DOMAIN: "meet.jitsi"
  XMPP_AUTH_DOMAIN: "auth.meet.jitsi"
  XMPP_MUC_DOMAIN: "muc.meet.jitsi"
  XMPP_INTERNAL_MUC_DOMAIN: "internal-muc.meet.jitsi"
  XMPP_GUEST_DOMAIN: "guest.meet.jitsi"
  XMPP_SERVER: "prosody"
  XMPP_BOSH_URL_BASE: "http://prosody:5280"

  # ---- JVB (Videobridge) ----
  JVB_BREWERY_MUC: "jvbbrewery"
  JVB_TCP_HARVESTER_DISABLED: "false"
  JVB_TCP_PORT: "4443"
  JVB_TCP_MAPPED_PORT: "30443"          # NodePort browsers will connect to
  JVB_STUN_SERVERS: ""                  # disable external STUN in lab
  JVB_DISABLE_STUN: "true"
  JVB_PORT: "10000"
  JVB_AUTH_USER: "jvb"

  # ---- Jicofo ----
  JICOFO_AUTH_USER: "focus"
  JICOFO_COMPONENT_SECRET: "s3cr3t"
  JICOFO_AUTH_PASSWORD: "jicofo_pass"

  # ---- General ----
  TZ: "UTC"
  ENABLE_GUESTS: "1"
  AUTH_TYPE: "none"

---
apiVersion: v1
kind: Secret
metadata:
  name: jitsi-secrets
  namespace: jitsi
type: Opaque
stringData:
  JICOFO_AUTH_PASSWORD: "jicofo_pass"
  JVB_AUTH_PASSWORD: "jvb_pass"
  JICOFO_COMPONENT_SECRET: "s3cr3t"
  # Prosody uses these same values
  PROSODY_JICOFO_PASSWORD: "jicofo_pass"
  PROSODY_JVB_PASSWORD: "jvb_pass"

---
# =============================================================================
# PROSODY  (XMPP server)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prosody
  namespace: jitsi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prosody
  template:
    metadata:
      labels:
        app: prosody
    spec:
      containers:
        - name: prosody
          image: jitsi/prosody:stable-9220
          envFrom:
            - configMapRef:
                name: jitsi-config
          env:
            - name: JICOFO_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JICOFO_AUTH_PASSWORD
            - name: JVB_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JVB_AUTH_PASSWORD
          ports:
            - containerPort: 5222   # XMPP client
            - containerPort: 5269   # XMPP server
            - containerPort: 5280   # BOSH / HTTP
            - containerPort: 5347   # component
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: prosody
  namespace: jitsi
spec:
  selector:
    app: prosody
  ports:
    - name: xmpp-client
      port: 5222
      targetPort: 5222
    - name: xmpp-server
      port: 5269
      targetPort: 5269
    - name: bosh
      port: 5280
      targetPort: 5280
    - name: component
      port: 5347
      targetPort: 5347

---
# =============================================================================
# JICOFO  (conference focus)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jicofo
  namespace: jitsi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jicofo
  template:
    metadata:
      labels:
        app: jicofo
    spec:
      containers:
        - name: jicofo
          image: jitsi/jicofo:stable-9220
          envFrom:
            - configMapRef:
                name: jitsi-config
          env:
            - name: JICOFO_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JICOFO_AUTH_PASSWORD
            - name: JICOFO_COMPONENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JICOFO_COMPONENT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# =============================================================================
# JVB  (Jitsi Videobridge — media relay)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jvb
  namespace: jitsi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jvb
  template:
    metadata:
      labels:
        app: jvb
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        - name: jvb
          image: jitsi/jvb:stable-9220
          envFrom:
            - configMapRef:
                name: jitsi-config
          env:
            - name: JVB_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jitsi-secrets
                  key: JVB_AUTH_PASSWORD
            - name: JAVA_SYS_PROPS
              value: "-Dorg.ice4j.ice.harvest.ALLOWED_INTERFACES=enp1s0 -Dorg.ice4j.ice.harvest.DISABLE_AWS_HARVESTER=true"

          ports:
            - containerPort: 10000
              protocol: UDP
            - containerPort: 4443
              protocol: TCP
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: jvb
  namespace: jitsi
spec:
  type: NodePort
  selector:
    app: jvb
  ports:
    - name: jvb-tcp
      port: 4443
      targetPort: 4443
      nodePort: 30443
      protocol: TCP
    - name: jvb-udp
      port: 10000
      targetPort: 10000
      nodePort: 30000
      protocol: UDP

---
# =============================================================================
# WEB  (Jitsi Meet nginx frontend)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-web
  namespace: jitsi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-web
  template:
    metadata:
      labels:
        app: jitsi-web
    spec:
      containers:
        - name: web
          image: jitsi/web:stable-9220
          envFrom:
            - configMapRef:
                name: jitsi-config
          ports:
            - containerPort: 80
            - containerPort: 443
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-web
  namespace: jitsi
spec:
  type: NodePort
  selector:
    app: jitsi-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
